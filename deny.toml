[graph]
targets = [
    "x86_64-unknown-linux-musl",
    "aarch64-unknown-linux-musl",
]

[advisories]
ignore = [
    # Transitive deps from Leptos/reqwest — can't upgrade without upstream changes.
    { id = "RUSTSEC-2024-0421", reason = "idna 0.2.3 via cookie_store; awaiting upstream update" },
    { id = "RUSTSEC-2024-0436", reason = "paste is unmaintained; used by Leptos macros" },
    { id = "RUSTSEC-2025-0134", reason = "rustls-pemfile unmaintained; used by hermitshell-agent directly, migrate to rustls-pki-types" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "BSL-1.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "MIT-0",
    "0BSD",
    "Unlicense",
    "OpenSSL",
    "Apache-2.0 WITH LLVM-exception",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
