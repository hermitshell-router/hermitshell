[package]
name = "hermitshell"
version = "0.1.0"
edition = "2024"

[dependencies]
leptos = { version = "0.6", features = ["ssr"] }
leptos_axum = "0.6"
leptos_router = { version = "0.6", features = ["ssr"] }
axum = "0.7"
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
hermitshell-ui = { path = "../hermitshell-ui" }
argon2 = "0.5"
hmac = "0.12"
sha2 = "0.10"
hex = "0.4"
rand = "0.8"
axum-server = { version = "0.7", features = ["tls-rustls"] }
rcgen = "0.13"
rustls-pemfile = "2"
tokio-rustls = "0.26"

[lints]
workspace = true

[package.metadata.leptos]
output-name = "hermitshell"
site-addr = "0.0.0.0:3000"
