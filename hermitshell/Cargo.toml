[package]
name = "hermitshell"
version = "0.1.0"
edition = "2024"

[dependencies]
leptos = { version = "0.6", features = ["ssr"] }
leptos_axum = "0.6"
leptos_router = { version = "0.6", features = ["ssr"] }
axum = "0.7"
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[lints]
workspace = true

[package.metadata.leptos]
site-addr = "0.0.0.0:3000"
