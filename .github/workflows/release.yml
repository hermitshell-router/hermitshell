name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: x86_64
            docker_platform: linux/amd64
          - target: aarch64-unknown-linux-musl
            arch: aarch64
            docker_platform: linux/arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install musl tools
        if: matrix.arch == 'x86_64'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.arch == 'aarch64'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build binaries
        env:
          LEPTOS_OUTPUT_NAME: hermitshell
        run: |
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            cross build --release -p hermitshell-agent -p hermitshell-dhcp -p hermitshell --target ${{ matrix.target }}
          else
            cargo build --release -p hermitshell-agent -p hermitshell-dhcp -p hermitshell --target ${{ matrix.target }}
          fi

      - name: Generate SBOM (CycloneDX)
        if: matrix.arch == 'x86_64'
        run: |
          cargo install cargo-cyclonedx
          cargo cyclonedx --manifest-path Cargo.toml --format json --describe crate
          VERSION="${GITHUB_REF_NAME}"
          # Collect per-crate SBOMs into a single directory
          mkdir -p sbom
          for bom in $(find . -name "bom.json" -not -path "./sbom/*" -not -path "./target/*"); do
            crate_dir="$(dirname "$bom")"
            crate_name="$(basename "$crate_dir")"
            cp "$bom" "sbom/hermitshell-${crate_name}-${VERSION}.cdx.json"
          done

      - name: Package tarball
        run: |
          VERSION="${GITHUB_REF_NAME}"
          DIR="hermitshell-${VERSION}-${{ matrix.arch }}-linux"
          mkdir "$DIR"
          cp target/${{ matrix.target }}/release/hermitshell-agent "$DIR/"
          cp target/${{ matrix.target }}/release/hermitshell-dhcp "$DIR/"
          cp target/${{ matrix.target }}/release/hermitshell "$DIR/"
          tar -czf "${DIR}.tar.gz" "$DIR"
          sha256sum "${DIR}.tar.gz" > "${DIR}.tar.gz.sha256"

      - name: Sign tarball (Ed25519)
        env:
          RELEASE_SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
        run: |
          if [ -z "$RELEASE_SIGNING_KEY" ]; then
            echo "::warning::RELEASE_SIGNING_KEY not set, skipping tarball signing"
            exit 0
          fi
          pip install --break-system-packages cryptography
          VERSION="${GITHUB_REF_NAME}"
          TARBALL="hermitshell-${VERSION}-${{ matrix.arch }}-linux.tar.gz"
          python3 -c "
          import os
          from cryptography.hazmat.primitives.asymmetric.ed25519 import Ed25519PrivateKey

          key_hex = os.environ['RELEASE_SIGNING_KEY']
          tarball_path = os.environ['TARBALL']

          private_bytes = bytes.fromhex(key_hex)
          key = Ed25519PrivateKey.from_private_bytes(private_bytes)

          with open(tarball_path, 'rb') as f:
              data = f.read()

          signature = key.sign(data)
          assert len(signature) == 64, f'unexpected signature length: {len(signature)}'

          with open(tarball_path + '.sig', 'wb') as f:
              f.write(signature)

          print(f'Signed {tarball_path} ({len(data)} bytes)')
          "
        env:
          TARBALL: hermitshell-${{ github.ref_name }}-${{ matrix.arch }}-linux.tar.gz

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build .deb package
        run: cargo deb -p hermitshell-agent --no-build --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.arch }}
          path: |
            hermitshell-*.tar.gz
            hermitshell-*.tar.gz.sha256
            hermitshell-*.tar.gz.sig
            target/${{ matrix.target }}/debian/*.deb

      - name: Upload SBOM artifacts
        if: matrix.arch == 'x86_64'
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom/*.cdx.json

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            hermitshell-*.tar.gz
            hermitshell-*.tar.gz.sha256
            hermitshell-*.tar.gz.sig
            *.deb
            *.cdx.json

  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Extract binaries for Docker
        run: |
          mkdir -p docker-ctx/amd64 docker-ctx/arm64
          VERSION="${GITHUB_REF_NAME}"
          tar -xzf "hermitshell-${VERSION}-x86_64-linux.tar.gz"
          cp hermitshell-${VERSION}-x86_64-linux/* docker-ctx/amd64/
          tar -xzf "hermitshell-${VERSION}-aarch64-linux.tar.gz"
          cp hermitshell-${VERSION}-aarch64-linux/* docker-ctx/arm64/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
