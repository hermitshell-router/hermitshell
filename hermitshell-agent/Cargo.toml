[package]
name = "hermitshell-agent"
version = "0.1.0"
edition = "2024"

[dependencies]
hermitshell-common = { path = "../hermitshell-common" }
anyhow = "1"
base64 = "0.22"
rusqlite = { version = "0.31", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

[lints]
workspace = true
