[package]
name = "hermitshell-agent"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1"
rusqlite = { version = "0.31", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
dhcproto = "0.12"
libc = "0.2"
socket2 = "0.5"
